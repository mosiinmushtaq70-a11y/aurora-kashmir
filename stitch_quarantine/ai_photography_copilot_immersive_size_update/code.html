<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AuroraLens Site Guide Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline": "#849396",
              "tertiary-fixed": "#f0dbff",
              "surface-dim": "#10131a",
              "surface-variant": "#32353c",
              "primary-fixed": "#9cf0ff",
              "on-secondary-fixed-variant": "#005047",
              "on-error": "#690005",
              "secondary-container": "#03c6b2",
              "surface-tint": "#00daf3",
              "surface-container-high": "#272a31",
              "surface-container-low": "#191c22",
              "on-error-container": "#ffdad6",
              "error-container": "#93000a",
              "secondary": "#44e2cd",
              "primary": "#c3f5ff",
              "tertiary-fixed-dim": "#ddb7ff",
              "surface-container-highest": "#32353c",
              "on-background": "#e0e2eb",
              "outline-variant": "#3b494c",
              "on-tertiary-fixed-variant": "#6900b3",
              "on-tertiary": "#490080",
              "on-primary-fixed": "#001f24",
              "on-tertiary-fixed": "#2c0051",
              "on-primary": "#00363d",
              "tertiary-container": "#e4c4ff",
              "secondary-fixed": "#62fae3",
              "on-secondary": "#003731",
              "background": "#10131a",
              "surface-bright": "#363940",
              "secondary-fixed-dim": "#3cddc7",
              "primary-container": "#00e5ff",
              "on-tertiary-container": "#7e22cc",
              "on-primary-container": "#00626e",
              "surface-container": "#1d2026",
              "on-secondary-fixed": "#00201c",
              "surface": "#10131a",
              "inverse-on-surface": "#2d3037",
              "inverse-surface": "#e0e2eb",
              "on-secondary-container": "#004d44",
              "tertiary": "#f7e7ff",
              "on-primary-fixed-variant": "#004f58",
              "surface-container-lowest": "#0b0e14",
              "on-surface": "#e0e2eb",
              "error": "#ffb4ab",
              "primary-fixed-dim": "#00daf3",
              "on-surface-variant": "#bac9cc"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .aurora-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-secondary/30">
<!-- Background Context: Blurred Tromsø Map -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-b from-black/60 to-surface z-10"></div>
<img class="w-full h-full object-cover filter blur-xl scale-110 opacity-40" data-alt="Blurred night aerial view of Tromso city with glowing street lights and green aurora borealis dancing across the dark sky" data-location="Tromso" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2KlV0w_QIMth3I3zJkfybvJSQ-MQo_51HXR_lGBXLPRmhZVLWOUgIx1F5Kg4zFBLOoOWO5nRfkKrQQeFv5uR3H23rWD2NeN94xfDynuWPxqMLbCIh2OGyyWRz0JJMpgJZeON3TSXnIX3mO4kCnQc53V29aQguHoVi05iwqMVHU1zlr6o9aGPJf9lHFNXHvefjVLOf1v2uiXngxcwj_VekDajqt91IXaIP4d8fl-Jo9MIHpJFvj-s_Y8QagyBLf-ooDxwg0QVrBHw"/>
</div>
<!-- Main Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
<!-- Site Guide Interface Modal - Resized to 85% width and 90% height -->
<main class="relative w-[85%] h-[90vh] bg-[#080B11]/80 backdrop-blur-3xl border border-white/10 rounded-[2rem] shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex flex-col overflow-hidden">
<!-- Shared Component: TopAppBar (Integrated as Friendly Header) -->
<header class="bg-[#080B11]/40 backdrop-blur-2xl border-b border-white/5 flex items-center justify-between px-6 py-5">
<div class="flex items-center gap-4">
<!-- Glowing Avatar -->
<div class="relative w-10 h-10 rounded-full bg-cyan-500/20 border border-cyan-400/30 flex items-center justify-center shadow-[0_0_15px_rgba(6,182,212,0.2)]">
<div class="absolute bottom-0 right-0 w-3 h-3 bg-cyan-400 rounded-full border-2 border-[#080B11] aurora-pulse"></div>
</div>
<div>
<h1 class="text-base font-semibold text-slate-100 font-headline tracking-tight">AuroraLens Guide</h1>
<p class="text-xs text-cyan-400 font-light flex items-center gap-1.5 mt-0.5">
                            Online • Ready to help
                        </p>
</div>
</div>
<button class="text-slate-500 hover:text-white transition-colors p-2 hover:bg-white/5 rounded-full">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Conversation Canvas -->
<section class="flex-1 overflow-y-auto p-6 space-y-6 hide-scrollbar">
<!-- AI Greeting Card -->
<div class="flex flex-col gap-3">
<div class="bg-white/5 border border-white/5 rounded-2xl rounded-tl-sm px-5 py-4 max-w-[90%] text-sm text-slate-200 font-light leading-relaxed shadow-sm">
                        Welcome! I'm your AuroraLens guide. I can explain how our XGBoost predictions work, help you find the best viewing spots, or guide you through the tactical map. How can I assist your journey today?
                    </div>
<span class="text-[10px] text-slate-500 font-label tracking-widest uppercase ml-1">10:24 AM</span>
</div>
<!-- Suggestion Chips -->
<div class="flex flex-wrap gap-2">
<button class="text-[11px] font-medium text-cyan-300 bg-cyan-500/10 border border-cyan-500/20 rounded-full px-4 py-2 hover:bg-cyan-500/20 transition-all active:scale-95 text-left">
                        How accurate is the ML forecast?
                    </button>
<button class="text-[11px] font-medium text-cyan-300 bg-cyan-500/10 border border-cyan-500/20 rounded-full px-4 py-2 hover:bg-cyan-500/20 transition-all active:scale-95 text-left">
                        Help me plan a trip to Tromsø
                    </button>
<button class="text-[11px] font-medium text-cyan-300 bg-cyan-500/10 border border-cyan-500/20 rounded-full px-4 py-2 hover:bg-cyan-500/20 transition-all active:scale-95 text-left">
                        What does the Kp-Index mean?
                    </button>
</div>
<!-- Spacer for layout asymmetry -->
<div class="h-12"></div>
<!-- Atmospheric Background Detail within Modal -->
<div class="opacity-10 pointer-events-none absolute bottom-32 left-0 w-full flex justify-center">
<div class="w-64 h-64 bg-cyan-500 rounded-full blur-[100px]"></div>
</div>
</section>
<!-- Shared Component: BottomNavBar (Transformed into Input Area) -->
<footer class="p-5 bg-gradient-to-t from-[#080B11] to-transparent relative z-10">
<div class="relative group">
<input class="w-full h-12 rounded-full bg-white/5 border border-white/10 px-6 pr-14 text-sm text-slate-200 placeholder:text-slate-500 focus:outline-none focus:ring-1 focus:ring-cyan-400/30 focus:border-cyan-400/30 transition-all backdrop-blur-md" placeholder="Ask me anything about AuroraLens..." type="text"/>
<button class="absolute right-1.5 top-1/2 -translate-y-1/2 bg-cyan-500/20 text-cyan-300 rounded-full p-2.5 flex items-center justify-center hover:bg-cyan-500/30 transition-all active:scale-90">
<span class="material-symbols-outlined text-[20px]" data-icon="send">send</span>
</button>
</div>
<!-- Subtle Branding/Metadata -->
<div class="flex justify-center mt-3">
<p class="text-[9px] text-slate-600 font-label tracking-widest uppercase">
                        Powered by Aurora Intelligence
                    </p>
</div>
</footer>
</main>
</div>
<!-- Floating Background Decoratives -->
<div class="fixed top-20 right-[20%] w-[300px] h-[300px] bg-secondary/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
<div class="fixed bottom-20 left-[15%] w-[400px] h-[400px] bg-primary-container/5 rounded-full blur-[150px] pointer-events-none z-0"></div>
</body></html>
