<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#272a31",
              "tertiary-fixed-dim": "#ddb7ff",
              "primary-container": "#00e5ff",
              "surface-tint": "#00daf3",
              "surface-container": "#1d2026",
              "inverse-primary": "#006875",
              "tertiary-fixed": "#f0dbff",
              "surface-bright": "#363940",
              "on-primary-container": "#00626e",
              "on-secondary-container": "#004d44",
              "secondary": "#44e2cd",
              "on-primary-fixed": "#001f24",
              "primary": "#c3f5ff",
              "outline-variant": "#3b494c",
              "on-tertiary-fixed-variant": "#6900b3",
              "on-surface-variant": "#bac9cc",
              "on-secondary": "#003731",
              "on-tertiary-fixed": "#2c0051",
              "error-container": "#93000a",
              "error": "#ffb4ab",
              "surface-variant": "#32353c",
              "surface-dim": "#10131a",
              "tertiary-container": "#e4c4ff",
              "background": "#10131a",
              "surface-container-lowest": "#0b0e14",
              "on-primary-fixed-variant": "#004f58",
              "on-tertiary-container": "#7e22cc",
              "on-background": "#e0e2eb",
              "on-secondary-fixed": "#00201c",
              "primary-fixed-dim": "#00daf3",
              "inverse-surface": "#e0e2eb",
              "on-primary": "#00363d",
              "surface-container-low": "#191c22",
              "inverse-on-surface": "#2d3037",
              "primary-fixed": "#9cf0ff",
              "on-secondary-fixed-variant": "#005047",
              "secondary-fixed-dim": "#3cddc7",
              "secondary-container": "#03c6b2",
              "tertiary": "#f7e7ff",
              "surface-container-highest": "#32353c",
              "outline": "#849396",
              "secondary-fixed": "#62fae3",
              "on-tertiary": "#490080",
              "surface": "#10131a",
              "on-error-container": "#ffdad6",
              "on-surface": "#e0e2eb",
              "on-error": "#690005"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(8, 11, 17, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary/30 selection:text-primary min-h-screen flex items-center justify-center">
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-4xl px-6">
<!-- Search Focused Section -->
<div class="flex flex-col items-center gap-16">
<!-- Hero Heading (Editorial Style) -->
<div class="text-center space-y-4">
<h1 class="font-headline text-5xl md:text-6xl font-extrabold tracking-tight text-on-surface">Find your window to the sky.</h1>
</div>
<!-- Massive Pill Search Bar -->
<div class="w-full group">
<div class="glass-panel rounded-full px-8 py-6 flex items-center gap-6 shadow-[0_40px_100px_rgba(0,0,0,0.4)] border-white/10 transition-all duration-500 group-focus-within:border-primary/40 group-focus-within:shadow-[0_0_80px_rgba(0,229,255,0.15)]">
<span class="material-symbols-outlined text-primary-container text-3xl">search</span>
<input class="bg-transparent border-none outline-none focus:ring-0 text-2xl font-body font-light text-on-surface placeholder:text-slate-500 w-full" placeholder="Search coordinates, cities, or regions..." type="text"/>
<div class="hidden md:flex items-center gap-2 px-4 py-2 rounded-xl bg-white/5 border border-white/5">
<span class="font-label text-[10px] text-slate-400 uppercase tracking-widest">CMD</span>
<span class="text-slate-600 font-light">+</span>
<span class="font-label text-[10px] text-slate-400 uppercase tracking-widest">K</span>
</div>
</div>
</div>
</div>
</main>
<!-- Subtle background atmospheric orbs to maintain depth without distracting -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full max-w-5xl max-h-[600px] pointer-events-none">
<div class="absolute top-0 right-0 w-[400px] h-[400px] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-secondary/5 blur-[120px] rounded-full"></div>
</div>
</body></html>
